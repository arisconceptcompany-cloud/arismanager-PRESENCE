name: Deploy to Contabo

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST_ARIS }}
          username: ${{ secrets.SERVER_USER_ARIS }}
          key: ${{ secrets.SERVER_SSH_KEY_ARIS }}
          script: |
            cd ${{ secrets.SERVER_PATH_ARIS }}
            git pull origin master
            npm ci --production
            pm2 restart presence-aris || pm2 start server.js --name presence-aris
